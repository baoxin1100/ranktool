<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>强度排名工具 - 从夯到拉</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- SortableJS for Mobile & Desktop Drag and Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- html2canvas for screenshots -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>从夯到拉排名！！</h1>
            <div class="controls">
                <label for="file-upload" class="upload-btn">添加图片</label>
                <input type="file" id="file-upload" multiple accept="image/*" style="display: none;" @change="handleFileUpload">
                
                <select v-model="selectedSize" class="size-select">
                    <option value="default">默认尺寸</option>
                    <option value="small">小尺寸</option>
                    <option value="medium">中尺寸</option>
                    <option value="large">大尺寸</option>
                </select>
                
                <button @click="addTier">添加排名栏位</button>
                <button @click="resetAll">重置排名</button>
                <button @click="saveScreenshot">保存截图</button>
            </div>
        </header>

        <main>
            <div id="tier-container" ref="tierContainer">
                <div v-for="(tier, index) in tiers" :key="tier.id" class="tier-row" :data-id="tier.id">
                    <div class="tier-label" 
                         :style="{ backgroundColor: tier.color }" 
                         contenteditable="true" 
                         @blur="updateTierName(index, $event)">
                        {{ tier.name }}
                    </div>
                    <div class="tier-drop-zone drop-zone" :data-tier-id="tier.id">
                        <!-- Items are rendered here by SortableJS or Vue -->
                        <div v-for="char in getCharactersInTier(tier.id)" 
                             :key="char.id" 
                             class="character-item" 
                             :class="'size-' + selectedSize"
                             :data-char-id="char.id"
                             @contextmenu.prevent="showCharContextMenu($event, char.id)">
                            <img :src="char.src" class="character-img">
                        </div>
                    </div>
                </div>
            </div>

            <div id="pool-container">
                <div class="pool-header">卡片池 (拖动至上方)</div>
                <div id="character-pool" class="drop-zone" data-tier-id="pool">
                    <div v-for="char in pool" 
                         :key="char.id" 
                         class="character-item" 
                         :class="'size-' + selectedSize"
                         :data-char-id="char.id"
                         @contextmenu.prevent="showCharContextMenu($event, char.id)">
                        <img :src="char.src" class="character-img">
                    </div>
                </div>
            </div>
        </main>

        <!-- Custom Context Menu -->
        <div class="context-menu" v-if="contextMenu.visible" 
             :style="{ left: contextMenu.x + 'px', top: contextMenu.y + 'px' }">
            <div class="context-menu-item" @click="confirmDelete">删除</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
