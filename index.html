<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>强度排名工具 - 从夯到拉</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>从夯到拉排名！！</h1>
        <div class="controls">
            <label for="file-upload" class="upload-btn">添加图片</label>
            <input type="file" id="file-upload" multiple accept="image/*" style="display: none;">
            <select id="size-selector" class="size-select">
                <option value="default" selected>默认尺寸</option>
                <option value="small">小尺寸</option>
                <option value="medium">中尺寸</option>
                <option value="large">大尺寸</option>
            </select>
            <button id="add-tier-btn">添加排名栏位</button>
            <button id="reset-btn">重置排名</button>
            <button id="save-btn">保存截图</button>
        </div>
    </header>

    <main>
        <div id="tier-container">
            <!-- Tiers will be generated by JS -->
        </div>

        <div id="pool-container">
            <div class="pool-header">卡片池 (拖动至上方)</div>
            <div id="character-pool" class="drop-zone"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
